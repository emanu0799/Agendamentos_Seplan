<script>
// ── FIREBASE SETUP ──────────────────────────────────────────────────────────
const firebaseApp = firebase.initializeApp({
  databaseURL: "https://seplan-agendamentos-default-rtdb.firebaseio.com"
});
const firebaseDB = firebase.database();
const DB_PATH    = "days";

window._fb = {
  listenDays: function(cb) {
    firebaseDB.ref(DB_PATH).on('value', snap => {
      cb(snap.val());
    });
  },
  saveDays: function(daysArr) {
    const obj = {};
    daysArr.forEach(d => {
      const key = d.id.replace(/[^a-zA-Z0-9]/g, '_');
      obj[key] = d;
    });
    firebaseDB.ref(DB_PATH).set(obj);
  },
  saveAnalistas: function(list) {
    firebaseDB.ref('analistas').set(list);
  },
  listenAnalistas: function(cb) {
    firebaseDB.ref('analistas').on('value', snap => { cb(snap.val()); });
  },
  saveBloqueios: function(obj) {
    firebaseDB.ref('bloqueios').set(obj);
  },
  listenBloqueios: function(cb) {
    firebaseDB.ref('bloqueios').on('value', snap => { cb(snap.val()); });
  }
};
</script>
<style>

  --border:   #2a3047;

  --tint-panel-gabriela: rgba(15,45,107,.2);
  --tint-panel-ruy:      rgba(10,51,32,.2);
  --tint-panel-sabrina:  rgba(61,15,20,.2);

  --tint-panel-marco:    rgba(40,15,64,.25);
  --row-alt: rgba(30,35,52,.7);
  --aviso-bg: #2a2010; --aviso-bd: #5a3d00; --aviso-txt: #f5a623;

/* ── TEMA CLARO ── */

  --tint-gabriela: rgba(37,99,235,.07);
  --tint-ruy:      rgba(22,163,74,.07);
  --tint-sabrina:  rgba(220,38,38,.07);
  --tint-vera:     rgba(217,119,6,.07);
  --tint-marco:    rgba(124,58,237,.07);
  --tint-livre:    rgba(200,206,222,.25);
  --tint-panel-gabriela: rgba(37,99,235,.08);
  --tint-panel-ruy:      rgba(22,163,74,.08);
  --tint-panel-sabrina:  rgba(220,38,38,.08);
  --tint-panel-vera:     rgba(217,119,6,.08);
  --tint-panel-marco:    rgba(124,58,237,.1);
  --row-alt: rgba(242,244,248,.8);
  --aviso-bg: #fffbeb; --aviso-bd: #d97706; --aviso-txt: #92400e;

/* Segue preferência do sistema se não houver escolha manual */

    --tint-panel-gabriela: rgba(37,99,235,.08);
    --tint-panel-ruy:      rgba(22,163,74,.08);

}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
body.app-booting .header,
body.app-booting .nav,
body.app-booting .filters-wrap,
body.app-booting .main { opacity: 0; }
body.app-loaded .header,
body.app-loaded .nav,
body.app-loaded .filters-wrap,
body.app-loaded .main { opacity: 1; }

/* HEADER */
.header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 20px; display: flex; align-items: center; justify-content: space-between;
  height: 60px; position: sticky; top: 0; z-index: 100;
}
.header-brand { display: flex; align-items: center; gap: 12px; }
.header-logo { width: 34px; height: 34px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.header-title { font-size: 15px; font-weight: 700; }
.header-sub { font-size: 11px; color: var(--muted); }
.theme-toggle {
  width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--border2);
  background: var(--card); cursor: pointer; display: flex; align-items: center;
  justify-content: center; font-size: 16px; transition: all .2s;
}
.theme-toggle:hover { background: var(--border); transform: rotate(20deg); }
.btn-novo-dia {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 14px; background: var(--accent); color: #fff;
  border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity .15s;
}
.btn-novo-dia:hover { opacity: .85; }

/* NAV */
.nav {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 20px; display: flex; gap: 4px; overflow-x: auto;
}
.nav::-webkit-scrollbar { height: 0; }
.nav-btn {
  padding: 10px 16px; border: none; background: transparent; color: var(--muted);
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
  cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: all .15s;
}
.nav-btn:hover { color: var(--text); }
.nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

/* MAIN */
.main { padding: 20px; max-width: 1100px; margin: 0 auto; }

/* FILTERS */
.filters-wrap {
  position: sticky;
  top: 60px;
  z-index: 90;
  background: var(--bg);
  padding: 10px 20px;
  border-bottom: 1px solid var(--border);
  margin: 0 -20px 20px;
}
.filters { display: flex; gap: 8px; flex-wrap: wrap; max-width: 1100px; margin: 0 auto; }
.filter-chip {
  padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border2);
  background: var(--card); color: var(--muted); font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all .15s;
}
.filter-chip:hover { border-color: var(--accent); color: var(--text); }
.filter-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.filter-chip.gabriela.active { background: var(--gabriela); border-color: var(--gabriela); }
.filter-chip.ruy.active      { background: var(--ruy); border-color: var(--ruy); color: #0a2010; }
.filter-chip.sabrina.active  { background: var(--sabrina); border-color: var(--sabrina); }
.filter-chip.vera.active     { background: var(--vera); border-color: var(--vera); color: #1a1000; }
.filter-chip.marco.active    { background: var(--marco); border-color: var(--marco); }
.filter-picker { position: relative; min-width: 190px; max-width: 220px; }
.filter-trigger {
  width: 100%; min-height: 34px; display: flex; align-items: center; justify-content: space-between; gap: 10px;
  border: 1px solid var(--border); border-radius: 16px; background: var(--card); color: var(--text);
  padding: 6px 10px 6px 12px; font: inherit; cursor: pointer; box-shadow: 0 8px 18px rgba(15,23,42,.045);
  transition: border-color .16s, box-shadow .16s, transform .16s;
}
.filter-trigger:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: 0 10px 22px rgba(15,23,42,.07); }
.filter-trigger-label { display: flex; flex-direction: column; align-items: flex-start; line-height: 1.15; }
.filter-trigger-label span { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: .55px; font-weight: 800; }
.filter-trigger-label strong { font-size: 12px; }
.filter-chevron { color: var(--muted); transition: transform .16s; }
.filter-picker.open .filter-chevron { transform: rotate(180deg); }
.filter-menu {
  position: absolute; top: calc(100% + 6px); left: 0; z-index: 40; width: min(300px, calc(100vw - 48px));
  display: none; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 6px; padding: 8px;
  border: 1px solid var(--border); border-radius: 16px; background: var(--card);
  box-shadow: 0 18px 38px rgba(15,23,42,.14); transform-origin: top left;
}
.filter-picker.open .filter-menu { display: grid; animation: menuBloom .18s cubic-bezier(.2,.8,.2,1) both; }
.filter-option {
  border: 1px solid var(--border); border-radius: 13px; background: var(--surface); color: var(--text);
  padding: 7px 9px; font: inherit; font-size: 12px; font-weight: 700; cursor: pointer; text-align: left;
  transition: transform .15s, border-color .15s, background .15s;
}
.filter-option:hover { transform: translateY(-1px); border-color: var(--accent); background: var(--card); }
.filter-option.active { border-color: var(--accent); background: rgba(47,100,240,.1); color: var(--accent); }

/* PAST DAYS */
.day-card.past-day { opacity: .55; }
.day-card.past-day .day-header { background: var(--bg); }
.slot.past-slot { cursor: default; opacity: .6; }
.slot.past-slot:hover { filter: none; }

/* MONTH GROUP */
.month-group { margin-bottom: 8px; }
.month-header {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 4px; margin-bottom: 10px; cursor: pointer; user-select: none;
}
.month-title {
  font-size: 13px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1px; color: var(--muted);
}
.month-count {
  font-size: 11px; color: var(--muted);
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 2px 8px;
}
.month-chevron { width: 14px; height: 14px; color: var(--muted); transition: transform .2s; margin-left: auto; }
.month-group.closed .month-chevron { transform: rotate(-90deg); }
.month-group.closed .month-body { display: none; }
.month-body { display: flex; flex-direction: column; gap: 10px; }

/* DAY CARDS */
.days-grid { display: flex; flex-direction: column; gap: 14px; }
.day-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.day-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 13px 18px; background: var(--surface); border-bottom: 1px solid var(--border);
  cursor: pointer; user-select: none;
}
.day-header-left { display: flex; align-items: center; gap: 12px; }
.day-badge { padding: 3px 10px; border-radius: 6px; font-size: 10px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; }
.badge-segunda { background: #1a2a4a; color: var(--accent); }
.badge-terca   { background: #1a2a4a; color: var(--accent); }
.badge-quarta  { background: #2a1a4a; color: var(--marco); }
.badge-quinta  { background: #1a3020; color: var(--ruy); }
.badge-sexta   { background: #3d2900; color: var(--vera); }
.day-date { font-size: 15px; font-weight: 600; }
.day-meta { font-size: 12px; color: var(--muted); margin-top: 1px; }
.day-actions { display: flex; gap: 6px; align-items: center; }
.icon-btn {
  width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border2);
  background: transparent; color: var(--muted); cursor: pointer; display: flex;
  align-items: center; justify-content: center; font-size: 14px; transition: all .15s;
}
.icon-btn:hover { background: var(--border); color: var(--text); }
.icon-btn.danger:hover { background: var(--sabrina-b); border-color: var(--sabrina); color: var(--sabrina); }
.chevron { width: 16px; height: 16px; color: var(--muted); transition: transform .2s; }
.day-card.open .chevron { transform: rotate(180deg); }
.day-body { display: none; padding: 12px 16px 16px; }
.day-card.open .day-body { display: block; }

/* AVISOS BAR */
.avisos-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
.aviso-tag {
  display: flex; align-items: center; gap: 5px; padding: 4px 10px;
  background: var(--aviso-bg); border: 1px solid var(--aviso-bd); border-radius: 6px;
  font-size: 11px; color: var(--aviso-txt); font-weight: 500;
}
.aviso-tag .rm-aviso {
  background: none; border: none; color: var(--aviso-txt); cursor: pointer;
  font-size: 13px; line-height: 1; padding: 0 0 0 2px; opacity: .6;
}
.aviso-tag .rm-aviso:hover { opacity: 1; }
.btn-add-aviso {
  padding: 4px 10px; border-radius: 6px; border: 1px dashed #5a3d00;
  background: transparent; color: #f5a623; font-size: 11px; cursor: pointer; transition: all .15s;
}
.btn-add-aviso:hover { background: #2a2010; }

/* SLOTS */
.slots { display: flex; flex-direction: column; gap: 5px; }
.slot {
  position: relative; overflow: hidden;
  display: grid; grid-template-columns: 68px 1fr auto auto;
  align-items: center; gap: 8px; padding: 9px 12px;
  border-radius: 8px; border-left: 3px solid transparent; cursor: pointer; transition: filter .15s, transform .18s ease, box-shadow .18s ease;
}
.slot:hover { filter: brightness(1.1); transform: translateX(3px); }
.slot.livre    { background: var(--tint-livre);    border-left-color: var(--livre-t); }
.slot.ocupado  { background: var(--slot-bg, var(--surface)); border-left-color: var(--slot-color, var(--accent)); }
.slot.ocupado .slot-time { color: var(--slot-color, var(--accent)); }
.slot.livre::after {
  content: ""; position: absolute; inset: 0; pointer-events: none;
  background: linear-gradient(110deg, transparent 0%, rgba(255,255,255,.14) 45%, transparent 70%);
  transform: translateX(-120%); animation: slotShimmer 4.8s ease-in-out infinite;
}
.slot.just-booked { animation: slotBooked .7s cubic-bezier(.2,.9,.2,1) both; box-shadow: 0 0 0 3px rgba(62,207,120,.18); }
.slot.canceling { animation: slotCancel .36s ease both; }
.slot.gabriela { border-left-color: var(--gabriela); background: var(--tint-gabriela); }
.slot.ruy      { border-left-color: var(--ruy);      background: var(--tint-ruy); }
.slot.sabrina  { border-left-color: var(--sabrina);  background: var(--tint-sabrina); }
.slot.vera     { border-left-color: var(--vera);     background: var(--tint-vera); }
.slot.marco    { border-left-color: var(--marco);    background: var(--tint-marco); }
.slot.dimmed   { opacity: .22; }
.slot-time { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; color: var(--muted); }
.slot-nome { font-size: 14px; font-weight: 600; }
.slot-assunto { font-size: 11px; color: var(--muted); margin-top: 1px; font-family: 'DM Mono', monospace; }
.slot-livre-label { font-size: 13px; color: var(--livre-t); font-style: italic; }
.analista-badge {
  padding: 3px 9px; border-radius: 5px; font-size: 10px; font-weight: 700;
  letter-spacing: .5px; text-transform: uppercase; white-space: nowrap;
}
.badge-gabriela { background: var(--gabriela-b); color: var(--gabriela); }
.badge-ruy      { background: var(--ruy-b);      color: var(--ruy); }
.badge-sabrina  { background: var(--sabrina-b);  color: var(--sabrina); }
.badge-vera     { background: var(--vera-b);     color: var(--vera); }
.badge-marco    { background: var(--marco-b);    color: var(--marco); }
.slot-rm {
  width: 22px; height: 22px; border-radius: 5px; border: none; background: transparent;
  color: var(--muted); cursor: pointer; font-size: 14px; display: flex;
  align-items: center; justify-content: center; opacity: 0; transition: opacity .15s;
}
.slot:hover .slot-rm { opacity: 1; }
.slot-rm:hover { color: var(--danger); background: var(--sabrina-b); transform: scale(1.08); }

/* PAINEL */
/* PAINEL */
.painel-toolbar {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 12px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 16px;
}
.painel-chips { display: flex; gap: 6px; flex-wrap: wrap; }
.pf-chip {
  padding: 5px 13px; border-radius: 16px; border: 1px solid var(--border2);
  background: var(--surface); color: var(--muted); font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s;
}
.pf-chip:hover { color: var(--text); border-color: var(--accent); }
.pf-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.pf-chip.gabriela.active { background: var(--gabriela); border-color: var(--gabriela); }
.pf-chip.ruy.active      { background: var(--ruy); border-color: var(--ruy); color: #0a2010; }
.pf-chip.sabrina.active  { background: var(--sabrina); border-color: var(--sabrina); }
.pf-chip.vera.active     { background: var(--vera); border-color: var(--vera); color: #1a1000; }
.pf-chip.marco.active    { background: var(--marco); border-color: var(--marco); }
.painel-datas { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.p-label { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
.p-date {
  background: var(--surface); border: 1px solid var(--border2); border-radius: 6px;
  color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 12px;
  padding: 5px 8px; outline: none; cursor: pointer;
}
.p-date:focus { border-color: var(--accent); }
.p-clear {
  padding: 5px 10px; background: transparent; border: 1px solid var(--border2);
  border-radius: 6px; color: var(--muted); font-size: 11px; cursor: pointer;
  font-family: 'DM Sans', sans-serif; transition: all .15s;
}
.p-clear:hover { background: var(--sabrina-b); color: var(--sabrina); border-color: var(--sabrina); }

/* KPI CARDS */
.kpi-row { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:10px; margin:16px 0; }
.kpi-card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:14px 16px; display:flex; align-items:center; gap:12px; }
.kpi-icon { width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
.kpi-label { font-size:11px; color:var(--muted); margin-bottom:3px; font-weight:500; }
.kpi-val { font-size:26px; font-weight:700; line-height:1; }

/* ANALISTA TABLE */
.an-table { width:100%; border-collapse:collapse; font-size:13px; }
.an-table th { font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; padding:8px 12px; border-bottom:1px solid var(--border); text-align:left; }
.an-table td { padding:10px 12px; border-bottom:1px solid var(--border); vertical-align:middle; }
.an-table tr:last-child td { border-bottom:none; }
.an-table tr:hover td { background:var(--surface); }
.an-badge { padding:4px 12px; border-radius:6px; font-size:11px; font-weight:700; }
.an-bar-track { height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
.an-bar-fill { height:100%; border-radius:3px; transition:width .4s; }

/* PIE */
.pie-leg-pct { color:var(--muted); font-size:10px; margin-left:4px; }

/* DASHBOARD */
.dashboard-row {
  display: flex; gap: 14px; margin: 16px 0; flex-wrap: wrap;
}
.dash-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px 20px; flex: 1; min-width: 260px;
}
.dash-card-title {
  font-size: 12px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .6px; color: var(--muted); margin-bottom: 14px;
}
.pie-wrap { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.pie-svg { width: 160px; height: 145px; flex-shrink: 0; }
.pie-legend { display: flex; flex-direction: column; gap: 7px; flex: 1; }
.pie-leg-item { display: flex; align-items: center; gap: 7px; font-size: 12px; }
.pie-leg-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.pie-leg-name { flex: 1; font-weight: 500; }
.pie-leg-val { font-weight: 600; white-space: nowrap; }

/* BAR CHART */
.bar-chart {
  display: flex; align-items: flex-end; gap: 6px;
  height: 130px; padding-bottom: 20px; position: relative;
  overflow-x: auto;
}
.bar-col { display: flex; flex-direction: column; align-items: center; gap: 3px; flex-shrink: 0; min-width: 32px; }
.bar-val { font-size: 9px; font-weight: 700; color: var(--muted); }
.bar-track {
  width: 26px; flex: 1; background: var(--border);
  border-radius: 4px; display: flex; align-items: flex-end; overflow: hidden;
}
.bar-fill {
  width: 100%; background: var(--accent); border-radius: 4px;
  min-height: 3px; transition: height .3s;
}
.bar-fill.bar-past { background: var(--muted); opacity: .5; }
.bar-label { font-size: 9px; color: var(--muted); text-align: center; white-space: nowrap; }

/* PAINEL TABLE */
.painel-table-wrap { overflow-x: auto; margin-top: 16px; border-radius: 10px; border: 1px solid var(--border); }
.painel-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.painel-table thead tr { background: var(--surface); }
.painel-table th {
  padding: 8px 10px; text-align: left; font-size: 10px; font-weight: 700;
  color: var(--muted); text-transform: uppercase; letter-spacing: .5px;
  border-bottom: 1px solid var(--border); white-space: nowrap;
}
.painel-table tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
.painel-table tbody tr:hover { background: var(--surface); }
.painel-table tbody tr:last-child { border-bottom: none; }
.painel-table td { padding: 7px 10px; vertical-align: middle; }
.row-past { opacity: .45; }
.td-date { font-weight: 600; white-space: nowrap; font-size: 12px; }
.td-slot { min-width: 110px; }
.td-slot.gabriela { background: var(--tint-gabriela); }
.td-slot.ruy      { background: var(--tint-ruy); }
.td-slot.sabrina  { background: var(--tint-sabrina); }
.td-slot.vera     { background: var(--tint-vera); }
.td-slot.marco    { background: var(--tint-marco); }
.td-slot.livre-cell { text-align: center; color: var(--border2); }
.td-nome { font-weight: 500; font-size: 11px; }
.td-an   { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .3px; margin-top: 1px; }
.td-total { white-space: nowrap; font-size: 12px; text-align: center; }
.livre-dot { color: var(--ruy); font-size: 8px; }

.stats-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px,1fr)); gap: 10px; margin-bottom: 20px; }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
.stat-label { font-size: 11px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: .5px; }
.stat-value { font-size: 28px; font-weight: 700; margin-top: 4px; }
.stat-value.gabriela { color: var(--gabriela); }
.stat-value.ruy      { color: var(--ruy); }
.stat-value.sabrina  { color: var(--sabrina); }
.stat-value.vera     { color: var(--vera); }
.stat-value.marco    { color: var(--marco); }
.panel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px,1fr)); gap: 12px; }
.panel-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.panel-card-header { padding: 10px 14px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.panel-card-date { font-size: 13px; font-weight: 600; }
.panel-card-day { font-size: 10px; color: var(--muted); }
.panel-slots { padding: 8px; display: flex; flex-direction: column; gap: 3px; }
.panel-slot { display: flex; justify-content: space-between; align-items: center; padding: 5px 8px; border-radius: 5px; font-size: 11px; }
.panel-slot.livre    { color: var(--livre-t); }
.panel-slot.gabriela { background: var(--tint-panel-gabriela); }
.panel-slot.ruy      { background: var(--tint-panel-ruy); }
.panel-slot.sabrina  { background: var(--tint-panel-sabrina); }
.panel-slot.vera     { background: var(--tint-panel-vera); }
.panel-slot.marco    { background: var(--tint-panel-marco); }
.panel-slot-time { font-family: 'DM Mono', monospace; color: var(--muted); font-size: 10px; flex-shrink: 0; }
.panel-slot-nome { font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; padding: 0 6px; }

/* LIVRES */
.livres-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; animation: cfgIn .25s ease both; }
.livres-title { font-size: 16px; font-weight: 700; letter-spacing: 0; }
.livres-count { padding: 4px 12px; background: rgba(62,207,120,.1); border: 1px solid rgba(62,207,120,.25); border-radius: 999px; font-size: 13px; color: var(--ruy); font-weight: 700; animation: pulseSoft 2.6s ease-in-out infinite; }
.livres-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 12px; align-items: start; }
.livre-day-card {
  position: relative; overflow: hidden;
  background: linear-gradient(180deg, var(--card), color-mix(in srgb, var(--card) 88%, var(--ruy)));
  border: 1px solid var(--border); border-radius: 16px;
  padding: 15px; box-shadow: 0 10px 30px rgba(15,23,42,.04);
  animation: livreIn .26s cubic-bezier(.2,.9,.2,1) both;
  transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
}
.livre-day-card::before {
  content: ""; position: absolute; inset: 0 auto 0 0; width: 4px;
  background: linear-gradient(180deg, var(--ruy), rgba(62,207,120,.18));
  opacity: .82;
}
.livre-day-card::after {
  content: ""; position: absolute; right: -42px; top: -58px; width: 130px; height: 130px;
  border-radius: 50%; background: rgba(62,207,120,.08); pointer-events: none;
}
.livre-day-card:hover { transform: translateY(-2px); box-shadow: 0 18px 38px rgba(15,23,42,.08); border-color: rgba(62,207,120,.32); }
.livre-day-card > * { position: relative; z-index: 1; }
.livre-day-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
.livre-day-kicker { color: var(--muted); font-size: 10px; font-weight: 800; letter-spacing: .7px; text-transform: uppercase; }
.livre-day-date { margin-top: 2px; font-size: 15px; font-weight: 800; color: var(--text); line-height: 1.1; }
.livre-day-total { padding: 5px 10px; border-radius: 999px; background: rgba(62,207,120,.13); color: var(--ruy); font-size: 12px; font-weight: 800; white-space: nowrap; box-shadow: inset 0 0 0 1px rgba(62,207,120,.14); }
.livre-times { display: flex; flex-wrap: wrap; gap: 8px; }
.livre-time-chip {
  position: relative; overflow: hidden;
  min-height: 38px; min-width: 88px; border: 1px solid color-mix(in srgb, var(--border) 74%, var(--ruy)); border-radius: 999px;
  background: var(--surface);
  color: var(--text); cursor: pointer; font-family: 'DM Sans', sans-serif;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  font-size: 12px; font-weight: 800;
  box-shadow: 0 5px 14px rgba(15,23,42,.05), inset 0 1px 0 rgba(255,255,255,.5);
  transition: transform .16s ease, box-shadow .16s ease, background .16s ease, border-color .16s ease;
}
.livre-time-chip::before {
  content: ""; position: absolute; inset: 0;
  background: linear-gradient(110deg, transparent 0%, rgba(62,207,120,.12) 45%, transparent 70%);
  transform: translateX(-120%); transition: transform .42s ease;
}
.livre-time-chip:hover { transform: translateY(-2px) scale(1.015); box-shadow: 0 12px 22px rgba(15,23,42,.09); background: color-mix(in srgb, var(--surface) 88%, var(--ruy)); border-color: rgba(62,207,120,.5); }
.livre-time-chip:hover::before { transform: translateX(120%); }
.livre-time-chip span { position: relative; z-index: 1; font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text); letter-spacing: .2px; }
.livre-time-chip small {
  position: relative; z-index: 1;
  width: 18px; height: 18px; display: grid; place-items: center; border-radius: 50%;
  background: var(--ruy); color: #fff; font-size: 14px; line-height: 1; font-weight: 900;
  box-shadow: 0 6px 12px rgba(62,207,120,.28);
  transform: scale(.9); transition: transform .16s ease, box-shadow .16s ease;
}
.livre-time-chip:hover small { transform: rotate(90deg) scale(1); box-shadow: 0 8px 16px rgba(62,207,120,.34); }
.btn-agendar-livre {
  padding: 5px 12px; background: rgba(62,207,120,.1); border: 1px solid rgba(62,207,120,.3);
  border-radius: 6px; color: var(--ruy); font-size: 11px; font-weight: 600;
  cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all .15s; white-space: nowrap;
}
.btn-agendar-livre:hover { background: rgba(62,207,120,.2); transform: scale(1.02); }

/* MODAL */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.7);
  z-index: 200; display: flex; align-items: center; justify-content: center;
  padding: 20px; opacity: 0; pointer-events: none; transition: opacity .2s;
}
.overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface); border: 1px solid var(--border2); border-radius: 14px;
  width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto;
  transform: translateY(16px); transition: transform .2s;
}
.overlay.open .modal { transform: translateY(0); }
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 20px 14px; border-bottom: 1px solid var(--border);
}
.modal-title { font-size: 16px; font-weight: 700; }
.modal-close {
  width: 30px; height: 30px; border-radius: 7px; border: 1px solid var(--border2);
  background: transparent; color: var(--muted); cursor: pointer; font-size: 18px;
  display: flex; align-items: center; justify-content: center;
}
.modal-close:hover { background: var(--border); color: var(--text); }
.modal-body { padding: 20px; display: flex; flex-direction: column; gap: 16px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
.form-input, .form-select {
  background: var(--card); border: 1px solid var(--border2); border-radius: 8px;
  padding: 10px 12px; color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 14px; outline: none; width: 100%; transition: border-color .15s;
}
.form-input:focus, .form-select:focus { border-color: var(--accent); }
.form-select option { background: var(--card); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-footer { padding: 14px 20px 18px; display: flex; gap: 10px; border-top: 1px solid var(--border); }
.btn-primary {
  flex: 1; padding: 10px; background: var(--accent); color: #fff; border: none;
  border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px;
  font-weight: 600; cursor: pointer; transition: opacity .15s;
}
.btn-primary:hover { opacity: .85; }
.btn-secondary {
  padding: 10px 18px; background: transparent; color: var(--muted);
  border: 1px solid var(--border2); border-radius: 8px; font-family: 'DM Sans', sans-serif;
  font-size: 14px; cursor: pointer; transition: all .15s;
}
.btn-secondary:hover { background: var(--border); color: var(--text); }

/* ANALISTA SELECTOR */
.analista-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
.analista-grid.needs-selection { animation: shakeNeed .28s ease both; }
.analista-opt {
  position: relative; overflow: hidden;
  padding: 8px 4px; border-radius: 8px; border: 2px solid var(--border2);
  background: var(--card); text-align: center; font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all .15s; user-select: none; caret-color: transparent;
  -webkit-user-select: none;
}
.analista-opt * { user-select: none; caret-color: transparent; -webkit-user-select: none; }
.analista-opt:hover { border-color: var(--border2); filter: brightness(1.15); }
.analista-opt.selected-person {
  border-color: currentColor;
  background: color-mix(in srgb, currentColor 14%, var(--card));
  animation: pickPop .34s cubic-bezier(.2,.9,.2,1) both;
  box-shadow: 0 0 0 4px color-mix(in srgb, currentColor 16%, transparent);
}
.analista-opt.selected-person::after {
  content: "✓";
  position: absolute; top: 4px; right: 6px;
  font-size: 10px; font-weight: 900; opacity: .9;
}
.analista-opt.sel-Gabriela { border-color: var(--gabriela); background: var(--gabriela-b); color: var(--gabriela); }
.analista-opt.sel-Ruy      { border-color: var(--ruy);      background: var(--ruy-b);      color: var(--ruy); }
.analista-opt.sel-Sabrina  { border-color: var(--sabrina);  background: var(--sabrina-b);  color: var(--sabrina); }
.analista-opt.sel-Vera     { border-color: var(--vera);     background: var(--vera-b);     color: var(--vera); }
.analista-opt.sel-Marco    { border-color: var(--marco);    background: var(--marco-b);    color: var(--marco); }
.analista-opt.nenhum.sel-nenhum { border-color: var(--border2); background: var(--border); color: var(--text); }

/* EMPTY / TOAST */
.empty { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty-icon { font-size: 40px; margin-bottom: 12px; }
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--success); color: #0a2010; padding: 10px 20px; border-radius: 8px;
  font-weight: 600; font-size: 13px; z-index: 300; transition: transform .25s; pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.err { background: var(--danger); color: #fff; }

@keyframes spin { to { transform: rotate(360deg); } }

/* SLOT AGENDADO POR */
.slot-agendadopor { font-size: 10px; color: var(--muted); margin-top: 1px; font-style: italic; }
.analista-opt.blocked { opacity: .45; cursor: not-allowed; border-color: var(--border); }
.livre-avisos { grid-column: 1 / -1; display: flex; flex-wrap: wrap; gap: 6px; padding-bottom: 4px; }

/* CONFIG SCREEN */
.config-wrap { max-width: 1120px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }
.config-section { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 18px; }
.config-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
.config-desc { font-size: 12px; color: var(--muted); margin-bottom: 14px; line-height: 1.5; }
.config-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; min-height: 36px; }
.config-item { display: flex; align-items: center; gap: 6px; }
.config-badge { padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: 700; }
.config-rm { width: 30px; height: 30px; background: transparent; border: none; color: var(--muted); cursor: pointer; font-size: 16px; line-height: 1; padding: 0; border-radius: 50%; transition: all .15s; }
.config-rm:hover { background: var(--sabrina-b); color: var(--sabrina); }
.config-add-row { display: flex; gap: 10px; align-items: center; }
.people-config { display: flex; flex-direction: column; gap: 14px; margin-bottom: 14px; }
.person-group { display: flex; flex-direction: column; gap: 7px; }
.person-group-title { font-size: 11px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; }
.person-row { display: grid; grid-template-columns: 34px 1fr 112px 30px; gap: 8px; align-items: center; padding: 7px; border: 1px solid transparent; border-radius: 10px; background: var(--surface); transition: border-color .15s, background .15s; }
.person-row:hover { border-color: var(--border2); }
.person-row .form-input, .person-row .form-select { min-height: 34px; height: 34px; border-color: transparent; background: transparent; padding: 6px 8px; }
.person-row .form-input:focus, .person-row .form-select:focus { border-color: var(--accent); background: var(--card); }
.person-color { width: 30px; height: 30px; padding: 2px; border: 1px solid var(--border2); border-radius: 50%; background: var(--card); cursor: pointer; }
.person-add { display: grid; grid-template-columns: 1fr 112px 34px auto; gap: 8px; align-items: center; padding-top: 4px; }
.person-add .form-input, .person-add .form-select { min-height: 38px; }
.person-add .person-color { width: 34px; height: 34px; }
.person-kind { font-size: 10px; text-transform: uppercase; letter-spacing: .4px; opacity: .72; margin-left: 6px; }
.team-config { animation: none; }
.team-hero { display: flex; justify-content: space-between; gap: 16px; align-items: flex-start; margin-bottom: 18px; }
.team-title { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 800; letter-spacing: 0; }
.team-title-dot { width: 34px; height: 34px; display: grid; place-items: center; border-radius: 14px; background: var(--accent); color: #fff; box-shadow: 0 12px 24px rgba(47,100,240,.22); }
.team-subtitle { color: var(--muted); font-size: 12px; line-height: 1.45; margin-top: 6px; max-width: 460px; }
.team-metrics { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
.team-metric { min-width: 82px; padding: 9px 12px; border: 1px solid var(--border); border-radius: 14px; background: linear-gradient(180deg, var(--card), var(--surface)); box-shadow: 0 10px 24px rgba(15,23,42,.05); transition: transform .18s ease, box-shadow .18s ease; }
.team-metric:hover { transform: translateY(-2px); box-shadow: 0 16px 30px rgba(15,23,42,.08); }
.team-metric strong { display: block; font-size: 18px; color: var(--text); line-height: 1; }
.team-metric span { display: block; margin-top: 4px; color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: .5px; }
.team-workspace { display: grid; grid-template-columns: minmax(360px, .9fr) minmax(520px, 1.25fr); gap: 18px; align-items: stretch; }
.team-panel { border: 1px solid var(--border); border-radius: 20px; background: linear-gradient(180deg, var(--card), var(--surface)); padding: 12px; min-width: 0; box-shadow: 0 18px 40px rgba(15,23,42,.06); }
.team-panel-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 2px 4px 10px; }
.team-panel-title { font-size: 11px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: .7px; }
.team-list { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; max-height: none; overflow: visible; padding-right: 0; }
.team-person { position: relative; width: 100%; display: grid; grid-template-columns: 38px minmax(0, 1fr); align-items: center; gap: 10px; border: 1px solid transparent; border-radius: 16px; background: transparent; padding: 10px; color: var(--text); cursor: pointer; text-align: left; transition: transform .18s cubic-bezier(.2,.8,.2,1), background .18s ease, border-color .18s ease, box-shadow .18s ease; }
.team-person::after { content: ""; position: absolute; inset: 8px auto 8px 0; width: 3px; border-radius: 999px; background: var(--accent); opacity: 0; transform: scaleY(.45); transition: opacity .18s, transform .18s; }
.team-person:hover { transform: translateY(-2px); background: var(--card); border-color: var(--border); box-shadow: 0 10px 24px rgba(15,23,42,.06); }
.team-person.active { background: var(--card); border-color: var(--accent); box-shadow: 0 16px 34px rgba(47,100,240,.16); }
.team-person.active::after { opacity: 1; transform: scaleY(1); }

// ── HELPERS ────────────────────────────────────────────────────────────────
function analClass(an) { return an ? 'ocupado' : ''; }
function badgeHtml(an) {
  if (!an) return '';
  return `<span class="analista-badge" style="background:${CORES_BG[an]||'var(--border)'};color:${CORES_AN[an]||'var(--accent)'}">${htmlAttr(an)}</span>`;
}
function dateToDDMMYYYY(iso) {
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}
function horariosDaData(dataBR) {
  const [d, m, y] = dataBR.split('/').map(Number);
  const data = new Date(y, m - 1, d);
  return data >= DATA_NOVOS_HORARIOS ? HORARIOS_NOVOS : HORARIOS_ANTIGOS;
}
function horariosDoDia(day) {
  const base = horariosDaData(day.data);
  const extras = Object.keys(day.slots || {})
    .filter(h => !base.includes(h) && day.slots[h] && day.slots[h].nome);
  return [...base, ...extras].sort((a, b) => a.localeCompare(b));
}
function totalHorariosDoDia(day) {
  return horariosDaData(day.data).length;
}
function weekdayInfo(weekday) {
  const w = (weekday || '').toLowerCase();
  if (w.includes('segunda')) return { label:'Segunda', cls:'badge-segunda', prefix:'SEGUNDA' };
  if (w.includes('terça') || w.includes('terca')) return { label:'Terça', cls:'badge-terca', prefix:'TERÇA' };
  if (w.includes('quarta')) return { label:'Quarta', cls:'badge-quarta', prefix:'QUARTA' };
  if (w.includes('quinta')) return { label:'Quinta', cls:'badge-quinta', prefix:'QUINTA' };
  if (w.includes('sexta')) return { label:'Sexta', cls:'badge-sexta', prefix:'SEXTA' };
  return { label: weekday || 'Dia', cls:'badge-quinta', prefix:'DIA' };
}
function hexToRgb(hex) {
  const v = (hex || '').replace('#', '');
  const full = v.length === 3 ? v.split('').map(c => c + c).join('') : v;
  const n = parseInt(full, 16);
  if (Number.isNaN(n)) return { r: 136, g: 144, b: 168 };
  return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
}
function corFundo(cor) {
  const { r, g, b } = hexToRgb(cor);
  return `rgba(${r},${g},${b},.18)`;
}
function normalizePessoa(item, idx=0) {
  if (typeof item === 'string') {
    return { nome: item.trim(), tipo: 'analista', cor: PALETA_PESSOAS[idx % PALETA_PESSOAS.length] };
  }
  const nome = (item?.nome || item?.name || '').trim();
  return {
    nome,
    tipo: item?.tipo === 'fiscal' ? 'fiscal' : 'analista',
    cor: /^#[0-9a-fA-F]{6}$/.test(item?.cor || '') ? item.cor : PALETA_PESSOAS[idx % PALETA_PESSOAS.length]
  };
}
function syncPessoas(list) {
  const seen = new Set();
  PESSOAS = (list || [])
    .map(normalizePessoa)
    .filter(p => p.nome && !seen.has(p.nome.toLowerCase()) && seen.add(p.nome.toLowerCase()));
  ANALISTAS = PESSOAS.map(p => p.nome);
  Object.keys(CORES_AN).forEach(k => delete CORES_AN[k]);
  Object.keys(CORES_BG).forEach(k => delete CORES_BG[k]);
  PESSOAS.forEach(p => {
    CORES_AN[p.nome] = p.cor;
    CORES_BG[p.nome] = corFundo(p.cor);
  });
}
function pessoaInfo(nome) {
  return PESSOAS.find(p => p.nome === nome) || { nome, tipo: 'analista', cor: CORES_AN[nome] || '#8890a8' };
}
function htmlAttr(v) {
  return String(v ?? '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}
function jsArg(v) {
  return JSON.stringify(String(v ?? ''));
}
function filtroLabel(valor) {
  if (valor === 'todos') return 'Todos';
  if (valor === 'livres') return 'Só livres';
  return valor || 'Todos';
}
function renderFilterPicker(kind, current, setterName, includeLivres=false) {
  const pickerId = `${kind}-filter-picker`;
  const menuId = `${kind}-filter-menu`;
  let html = `<div class="filter-picker" id="${pickerId}">`;
  html += `<button class="filter-trigger" type="button" onclick="toggleFilterMenu('${pickerId}')"><span class="filter-trigger-label"><span>Responsável</span><strong>${htmlAttr(filtroLabel(current))}</strong></span><span class="filter-chevron">⌄</span></button>`;
  html += `<div class="filter-menu" id="${menuId}">`;
  html += `<button class="filter-option${current==='todos'?' active':''}" data-value="todos" type="button" onclick="${setterName}('todos');closeFilterMenu('${pickerId}')">Todos</button>`;
  PESSOAS.forEach(p => {
    html += `<button class="filter-option${current===p.nome?' active':''}" data-value="${htmlAttr(p.nome)}" type="button" onclick='${setterName}(${jsArg(p.nome)});closeFilterMenu("${pickerId}")'>${htmlAttr(p.nome)}</button>`;
  });
  if (includeLivres) html += `<button class="filter-option${current==='livres'?' active':''}" data-value="livres" type="button" onclick="${setterName}('livres');closeFilterMenu('${pickerId}')">Só livres</button>`;
  html += '</div></div>';
  return html;
}
function toggleFilterMenu(id) {
  document.querySelectorAll('.filter-picker.open').forEach(el => { if (el.id !== id) el.classList.remove('open'); });
  document.getElementById(id)?.classList.toggle('open');
}
function closeFilterMenu(id) {
  document.getElementById(id)?.classList.remove('open');
}
function updateFilterPickerLabel(kind, current) {
  const picker = document.getElementById(`${kind}-filter-picker`);
  if (!picker) return false;
  const label = picker.querySelector('.filter-trigger-label strong');
  if (label) label.textContent = filtroLabel(current);
  picker.querySelectorAll('.filter-option').forEach(btn => {
    btn.classList.toggle('active', (btn.dataset.value || '') === current);
  });
  return true;
}
function slotKey(dayId, hora) {
  return `${dayId}__${hora}`.replace(/[^a-zA-Z0-9_-]/g, '_');
}
function toast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (err?' err':'');
  setTimeout(() => t.className = 'toast', 2500);
}
function overlayClick(e, id) { if (e.target.id === id) closeModal(id); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// ── ANALISTA SELECTOR ──────────────────────────────────────────────────────
function selAnalista(an) {
  selAnalistaVal = an;
  document.getElementById('analista-grid')?.classList.remove('needs-selection');
  document.querySelectorAll('.analista-opt').forEach(el => {
    el.className = el.className.replace(/\bsel-\S+/g,'').trim();
    el.classList.remove('selected-person');
  });
  const el = Array.from(document.querySelectorAll('.analista-opt'))
    .find(opt => (opt.dataset.analista || '') === (an || ''));
  if (el) {
    el.classList.add('selected-person');
    el.style.animation = 'none';
    void el.offsetWidth;
    el.style.animation = '';
  }
}

// ── MODAL SLOT ─────────────────────────────────────────────────────────────
function onlyDigitsLimit(input, max) {
  input.value = String(input.value || '').replace(/\D/g, '').slice(0, max);
}

function splitProtocolo(valor) {
  const match = String(valor || '').match(/(\d{1,5})\s*\/?\s*(\d{4})?/);
  return {
    numero: match?.[1] || '',
    ano: match?.[2] || ''
  };
}

function protocoloValue() {
  const numero = document.getElementById('slot-protocolo-numero')?.value.trim() || '';
  const ano = document.getElementById('slot-protocolo-ano')?.value.trim() || '';
  return numero && ano ? `${numero}/${ano}` : numero;
}

function openSlot(dayId, hora) {
  const day = DAYS.find(d => d.id === dayId);
  const slot = day.slots[hora];
  editCtx = { dayId, hora };

  document.getElementById('slot-data').value = day.data;
  document.getElementById('slot-hora').value = hora;
  document.getElementById('slot-nome').value = slot.nome;
  const protocolo = splitProtocolo(slot.assunto);
  document.getElementById('slot-protocolo-numero').value = protocolo.numero;
  document.getElementById('slot-protocolo-ano').value = protocolo.ano;
  document.getElementById('slot-assunto').value = slot.assunto;
  document.getElementById('slot-agendadopor').value = slot.agendadopor || '';
  document.getElementById('modal-slot-title').textContent =
    slot.nome ? 'Editar agendamento' : 'Agendar horário';

  // Reconstrói grid com analistas atuais, marcando bloqueados para este dia
  rebuildAnalistaGrid(dayId);
  selAnalista(slot.analista);
  document.getElementById('overlay-slot').classList.add('open');
  setTimeout(() => document.getElementById('slot-nome').focus(), 200);
}

function salvarSlot() {
  const nome = document.getElementById('slot-nome').value.trim();
  if (!nome) { toast('Informe o nome do requerente', true); return; }
  const selectedAnalista = selAnalistaVal || document.querySelector('.analista-opt.selected-person')?.dataset.analista || '';
  if (!selectedAnalista) {
    const grid = document.getElementById('analista-grid');
    grid?.classList.remove('needs-selection');
    void grid?.offsetWidth;
    grid?.classList.add('needs-selection');
    toast('Selecione o responsável', true);
    return;
  }
  const { dayId, hora } = editCtx;
  const day = DAYS.find(d => d.id === dayId);
  day.slots[hora] = {
    nome,
    assunto: protocoloValue(),
    analista: selectedAnalista,
    agendadopor: document.getElementById('slot-agendadopor').value.trim()
  };
  lastBookedSlotKey = slotKey(dayId, hora);
  saveDays();
  closeModal('overlay-slot');
  toast('Agendamento marcado ✓');
  render();
  setTimeout(() => { if (lastBookedSlotKey === slotKey(dayId, hora)) lastBookedSlotKey = ''; }, 1200);
}

function limparSlot(dayId, hora, e) {
  e.stopPropagation();
  if (!confirm('Remover este agendamento?')) return;
  const el = document.querySelector(`[data-slot-key="${slotKey(dayId, hora)}"]`);
  if (el) el.classList.add('canceling');
  setTimeout(() => {
    const day = DAYS.find(d => d.id === dayId);
    day.slots[hora] = { nome:'', assunto:'', analista:'' };
    saveDays();
    toast('Agendamento cancelado');
    render();
  }, el ? 260 : 0);
}

// ── AVISOS ─────────────────────────────────────────────────────────────────
function addAviso(dayId) {
  const txt = prompt('Novo aviso:');
  if (!txt || !txt.trim()) return;
  const day = DAYS.find(d => d.id === dayId);
  day.avisos.push(txt.trim());
  saveDays(); render();
}
function rmAviso(dayId, idx, e) {
  e.stopPropagation();
  const day = DAYS.find(d => d.id === dayId);
  day.avisos.splice(idx, 1);
  saveDays(); render();
}

// ── MODAL NOVO DIA ─────────────────────────────────────────────────────────
function openModalNovoDia() {
  document.getElementById('novo-data').value = '';
  document.getElementById('novo-aviso').value = '';
  document.getElementById('overlay-dia').classList.add('open');
  setTimeout(() => document.getElementById('novo-data').focus(), 200);
}

function salvarNovoDia() {
  const isoDate = document.getElementById('novo-data').value;
  if (!isoDate) { toast('Selecione uma data', true); return; }
  const weekday = document.getElementById('novo-weekday').value;
  const aviso   = document.getElementById('novo-aviso').value.trim();
  const data    = dateToDDMMYYYY(isoDate);
  const parts   = isoDate.split('-');
  const dd = parts[2], mm = parts[1];
  const pre = weekdayInfo(weekday).prefix;
  const id  = `${pre} ${dd}${mm}`;

  if (DAYS.find(d => d.id === id)) { toast('Este dia já existe', true); return; }

  const emptySlots = {};
  horariosDaData(data).forEach(h => { emptySlots[h] = { nome:'', assunto:'', analista:'' }; });
  const newDay = { id, data, weekday, avisos: aviso ? [aviso] : [], slots: emptySlots };
  DAYS.push(newDay);
  DAYS.sort((a,b) => {
    const toIso = d => d.split('/').reverse().join('-');
    return toIso(a.data).localeCompare(toIso(b.data));
  });
  saveDays();
  closeModal('overlay-dia');
  toast(`Dia ${data} criado ✓`);
  render();
}

function excluirDia(dayId, e) {
  e.stopPropagation();
  const day = DAYS.find(d => d.id === dayId);
  if (!confirm(`Excluir o dia ${day.data}? Esta ação não pode ser desfeita.`)) return;
  DAYS = DAYS.filter(d => d.id !== dayId);
  saveDays(); toast('Dia removido'); render();
}

// ── RENDER AGENDA ──────────────────────────────────────────────────────────
const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
               'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

function renderAgenda() {
  const filt = currentAnalista;

  // Preserva quais cards/meses estão abertos
  const openCards = new Set();
  document.querySelectorAll('.day-card.open').forEach(el => openCards.add(el.id));
  const openMonths = new Set();
  document.querySelectorAll('.month-group:not(.closed)').forEach(el => openMonths.add(el.id));
  const firstRender = openMonths.size === 0 && openCards.size === 0;

  // Agrupa por mês
  const byMonth = {};
  let anyDay = false;
  DAYS.forEach((day) => {
    const slots = horariosDoDia(day).map(h => ({ h, ...day.slots[h] }));
    if (filt === 'livres' && !slots.some(s => !s.nome)) return;
    if (filt !== 'todos' && filt !== 'livres' && !slots.some(s => s.analista === filt)) return;
    anyDay = true;
    const parts = day.data.split('/');
    const monthKey = parts[2] + '-' + parts[1];
    if (!byMonth[monthKey]) byMonth[monthKey] = [];
    byMonth[monthKey].push(day);
  });

  if (!anyDay) {
    document.getElementById('view-agenda').innerHTML =
      '<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">Nenhum resultado para este filtro.</div></div>';
    return;
  }

  const sortedMonths = Object.keys(byMonth).sort();
  const lastMonth = sortedMonths[sortedMonths.length - 1];
  const todayStr = new Date().toLocaleDateString('pt-BR');

  let html = '';
  sortedMonths.forEach(monthKey => {
    const parts = monthKey.split('-');
    const monthLabel = MESES[parseInt(parts[1])-1] + ' ' + parts[0];
    const groupId = 'month-' + monthKey;
    const hasToday = byMonth[monthKey].some(d => d.data === todayStr);
    const monthOpen = firstRender ? (monthKey === lastMonth || hasToday) : openMonths.has(groupId);

    html += '<div class="month-group' + (monthOpen ? '' : ' closed') + '" id="' + groupId + '">';
    html += `<div class="month-header" onclick="toggleMonth('${groupId}')">`;
    html += '<div class="month-title">' + monthLabel + '</div>';
    html += '<div class="month-count">' + byMonth[monthKey].length + ' dia' + (byMonth[monthKey].length !== 1 ? 's' : '') + '</div>';
    html += '<svg class="month-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>';
    html += '</div><div class="month-body">';

    byMonth[monthKey].forEach(day => {
      const slots = horariosDoDia(day).map(h => ({ h, ...day.slots[h] }));
      const ocupados = slots.filter(s => s.nome).length;
      const livres   = horariosDaData(day.data).filter(h => !day.slots[h] || !day.slots[h].nome).length;
      const wd = weekdayInfo(day.weekday);
      const isToday = day.data === todayStr;
      const isPast  = parseDataBR(day.data) < (() => { const h = new Date(); h.setHours(0,0,0,0); return h; })() && !isToday;
      const cardId  = 'card-' + day.id.replace(/[^a-zA-Z0-9]/g, '_');
      const cardOpen = isToday || openCards.has(cardId);

      html += '<div class="day-card' + (cardOpen ? ' open' : '') + (isPast ? ' past-day' : '') + '" id="' + cardId + '">';
      html += `<div class="day-header" onclick="toggleCard('${cardId}')">`;
      html += '<div class="day-header-left">';
      html += '<span class="day-badge ' + wd.cls + '">' + wd.label + '</span>';
      html += '<div><div class="day-date">' + day.data + (isToday ? ' <span style="font-size:10px;color:var(--success)">● hoje</span>' : '') + (isPast ? ' <span style="font-size:10px;color:var(--muted)">• encerrado</span>' : '') + '</div>';
      html += '<div class="day-meta">' + ocupados + ' agendamento' + (ocupados!==1?'s':'') + ' · ' + livres + ' livre' + (livres!==1?'s':'') + '</div></div></div>';
      html += '<div class="day-actions">';
      html += `<button class="icon-btn" onclick="addAviso('${day.id}');event.stopPropagation()" title="Adicionar aviso">⚠</button>`;
      html += `<button class="icon-btn danger" onclick="excluirDia('${day.id}',event)" title="Excluir dia">🗑</button>`;
      html += '<svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>';
      html += '</div></div><div class="day-body">';

      if (day.avisos.length) {
        html += '<div class="avisos-bar">';
        day.avisos.forEach((av, ai) => {
          html += `<span class="aviso-tag">⚠ ${av}<button class="rm-aviso" onclick="rmAviso('${day.id}',${ai},event)">×</button></span>`;
        });
        html += '</div>';
      }

      html += '<div class="slots">';
      slots.forEach(s => {
        const isLivre = !s.nome;
        const anClass = analClass(s.analista);
        let cls = isLivre ? 'livre' : (anClass || 'ocupado');
        const key = slotKey(day.id, s.h);
        if (key === lastBookedSlotKey) cls += ' just-booked';
        const slotColor = !isLivre && s.analista ? (CORES_AN[s.analista] || '#8890a8') : '';
        const slotBg = !isLivre && s.analista ? corFundo(slotColor) : '';
        let dimmed = false;
        if (filt !== 'todos') {
          if (filt === 'livres' && !isLivre) dimmed = true;
          if (filt !== 'livres' && !isLivre && s.analista !== filt) dimmed = true;
        }
        html += `<div class="slot ${cls}${dimmed ? ' dimmed' : ''}${isPast ? ' past-slot' : ''}" data-slot-key="${key}" style="${slotColor ? `--slot-color:${slotColor};--slot-bg:${slotBg};` : ''}" ${isPast ? '' : `onclick="openSlot('${day.id}','${s.h}')"`}>`;
        html += '<div class="slot-time">' + s.h + '</div>';
        html += '<div class="slot-info">';
        if (isLivre) {
          html += `<div class="slot-livre-label">${isPast ? '— livre' : '— livre — clique para agendar'}</div>`;
        } else {
          html += '<div class="slot-nome">' + s.nome + '</div>';
          if (s.assunto) html += '<div class="slot-assunto">' + s.assunto + '</div>';
          if (s.agendadopor) html += '<div class="slot-agendadopor">por ' + s.agendadopor + '</div>';
        }
        html += '</div>' + badgeHtml(s.analista);
        if (!isLivre && !isPast) html += `<button class="slot-rm" onclick="limparSlot('${day.id}','${s.h}',event)" title="Remover">×</button>`;
        html += '</div>';
      });
      html += '</div></div></div>';
    });
    html += '</div></div>';
  });

  document.getElementById('view-agenda').innerHTML = html;
}

// ── PAINEL STATE ───────────────────────────────────────────────────────────
let painelAnalista = 'todos';
let painelDe = '';
let painelAte = '';

function setPainelAnalista(an) {
  painelAnalista = an;
  updateFilterPickerLabel('painel', painelAnalista);
  renderPainel();
}

// ── RENDER PAINEL ──────────────────────────────────────────────────────────
const CORES_AN = {};
const CORES_BG = {};
syncPessoas(PESSOAS);

function calcPainel(filtDays, anFiltro) {
  const totals = Object.fromEntries(ANALISTAS.map(an => [an, 0]));
  let totalAgend = 0, totalSlots = 0;
  filtDays.forEach(day => {
    horariosDoDia(day).forEach(h => {
      const s = day.slots[h] || { nome:'', assunto:'', analista:'', agendadopor:'' };
      if (anFiltro !== 'todos') {
        // Conta só atendimentos do analista filtrado
        if (s.analista === anFiltro) {
          totalSlots++;
          totalAgend++;
          totals[anFiltro]++;
        }
      } else {
        totalSlots++;
        if (s.nome) {
          totalAgend++;
          if (totals[s.analista] !== undefined) totals[s.analista]++;
        }
      }
    });
  });

  // Vagas futuras = sempre total geral de todos os dias, independente do filtro
  let totalFuturos = 0;
  const allDays = (typeof DAYS !== 'undefined' && DAYS.length) ? DAYS : [];
  allDays.forEach(day => {
    if (!isFuturoOuHoje(day.data)) return;
    horariosDoDia(day).forEach(h => {
      if (!day.slots[h] || !day.slots[h].nome) totalFuturos++;
    });
  });

  // Taxa de ocupação: slots do analista / total de slots do período
  const slotsBase = anFiltro === 'todos'
    ? totalSlots
    : filtDays.reduce((acc, day) => acc + totalHorariosDoDia(day), 0);
  return { totals, totalAgend, totalFuturos, totalSlots: slotsBase };
}

function buildPie(totals, totalAgend) {
  const pieData = ANALISTAS.map(an => ({ an, val: totals[an] })).filter(d => d.val > 0);
  const semAn = totalAgend - pieData.reduce((s,d) => s+d.val, 0);
  if (semAn > 0) pieData.push({ an:'Sem responsável', val: semAn });
  const tot = pieData.reduce((s,d) => s+d.val, 0) || 1;
  const R = 72, CX = 90, CY = 90;
  let slices = '', angle = -Math.PI/2;
  pieData.forEach(d => {
    const sw = (d.val/tot)*2*Math.PI;
    const ea = angle + sw;
    const x1 = CX+R*Math.cos(angle), y1 = CY+R*Math.sin(angle);
    const x2 = CX+R*Math.cos(ea),   y2 = CY+R*Math.sin(ea);
    const lg = sw > Math.PI ? 1 : 0;
    const col = CORES_AN[d.an] || '#8890a8';
    const pct = Math.round(d.val/tot*100);
    slices += `<path d="M${CX},${CY} L${x1.toFixed(1)},${y1.toFixed(1)} A${R},${R} 0 ${lg},1 ${x2.toFixed(1)},${y2.toFixed(1)} Z" fill="${col}" opacity=".88" stroke="var(--bg)" stroke-width="2"><title>${d.an}: ${d.val} (${pct}%)</title></path>`;
    angle = ea;
  });
  let legend = '';
  pieData.forEach(d => {
    const col = CORES_AN[d.an] || '#8890a8';
    const pct = Math.round(d.val/tot*100);
    legend += `<div class="pie-leg-item"><span class="pie-leg-dot" style="background:${col}"></span><span class="pie-leg-name">${d.an}</span><span class="pie-leg-val">${d.val}<span class="pie-leg-pct">${pct}%</span></span></div>`;
  });
  return { slices, legend, CX, CY, R };
}

function renderPainel() {
  const de  = document.getElementById('p-de')?.value  || '';
  const ate = document.getElementById('p-ate')?.value || '';

  const filtDays = DAYS.filter(day => {
    if (painelAnalista !== 'todos' && !horariosDoDia(day).some(h => day.slots[h] && day.slots[h].analista === painelAnalista)) return false;
    if (de || ate) {
      const d = parseDataBR(day.data);
      if (de) { const [dy,dm,dd]=de.split('-'); if (d < new Date(dy,dm-1,dd)) return false; }
      if (ate) { const [ay,am,ad]=ate.split('-'); if (d > new Date(ay,am-1,ad)) return false; }
    }
    return true;
  });

  const { totals, totalAgend, totalFuturos, totalSlots } = calcPainel(filtDays, painelAnalista);
  const taxaOcup = totalSlots > 0 ? Math.round(totalAgend/totalSlots*100) : 0;

  let html = '';

  // ── Toolbar ──
  html += '<div class="painel-toolbar">';
  html += '<div class="painel-chips">';
  html += renderFilterPicker('painel', painelAnalista, 'setPainelAnalista', false);
  html += '</div><div class="painel-datas">';
  html += `<label class="p-label">De <input class="p-date" id="p-de" type="date" value="${de}" onchange="renderPainel()"></label>`;
  html += `<label class="p-label">Até <input class="p-date" id="p-ate" type="date" value="${ate}" onchange="renderPainel()"></label>`;
  html += `<button class="p-clear" onclick="document.getElementById('p-de').value='';document.getElementById('p-ate').value='';renderPainel()">✕ Limpar</button>`;
  html += '</div></div>';

  // ── 4 Cards de KPI ──
  html += '<div class="kpi-row">';
  html += `<div class="kpi-card"><div class="kpi-icon" style="background:#1a2a4a;color:var(--accent)">📋</div><div class="kpi-body"><div class="kpi-label">Atendimentos agendados</div><div class="kpi-val" style="color:var(--accent)">${totalAgend}</div></div></div>`;
  html += `<div class="kpi-card"><div class="kpi-icon" style="background:#0a3320;color:var(--ruy)">🟢</div><div class="kpi-body"><div class="kpi-label">Horários livres futuros</div><div class="kpi-val" style="color:var(--ruy)">${totalFuturos}</div><div style="font-size:10px;color:var(--muted);margin-top:2px">total geral do sistema</div></div></div>`;
  html += `<div class="kpi-card"><div class="kpi-icon" style="background:#1a1a3a;color:#b06ef5">📊</div><div class="kpi-body"><div class="kpi-label">Taxa de ocupação</div><div class="kpi-val" style="color:#b06ef5">${taxaOcup}%</div></div></div>`;
  html += `<div class="kpi-card"><div class="kpi-icon" style="background:#1a2a1a;color:var(--muted)">📅</div><div class="kpi-body"><div class="kpi-label">Dias no período</div><div class="kpi-val" style="color:var(--muted)">${filtDays.length}</div></div></div>`;
  html += '</div>';

  if (!filtDays.length) {
    html += '<div class="empty" style="margin-top:20px"><div class="empty-icon">📭</div><div class="empty-text">Nenhum resultado para os filtros selecionados.</div></div>';
    document.getElementById('view-painel').innerHTML = html;
    return;
  }

  // ── Dashboard row: Pizza + Barras ──
  html += '<div class="dashboard-row">';

  // Pizza
  const { slices, legend, CX, CY } = buildPie(totals, totalAgend);
  html += `<div class="dash-card">
    <div class="dash-card-title">Distribuição por pessoa</div>
    <div class="pie-wrap">
      <svg viewBox="0 0 180 180" class="pie-svg">${slices}
        <circle cx="${CX}" cy="${CY}" r="34" fill="var(--card)"/>
        <text x="${CX}" y="${CY-5}" text-anchor="middle" fill="var(--text)" font-size="16" font-weight="700" font-family="DM Sans">${totalAgend}</text>
        <text x="${CX}" y="${CY+11}" text-anchor="middle" fill="var(--muted)" font-size="9" font-family="DM Sans">agendados</text>
      </svg>
      <div class="pie-legend">${legend}</div>
    </div>
  </div>`;

  // Barras de ocupação
  const barDays = filtDays.length <= 16 ? filtDays : filtDays.slice(-16);
  let barHtml = '<div class="bar-chart">';
  barDays.forEach(day => {
    const totalDia = totalHorariosDoDia(day);
    const agend = horariosDoDia(day).filter(h => day.slots[h] && day.slots[h].nome).length;
    const pct = totalDia > 0 ? Math.round(agend/totalDia*100) : 0;
    const past = !isFuturoOuHoje(day.data);
    const [dd,mm] = day.data.split('/');
    barHtml += `<div class="bar-col">
      <div class="bar-val">${agend}</div>
      <div class="bar-track"><div class="bar-fill${past?' bar-past':''}" style="height:${pct}%"></div></div>
      <div class="bar-label">${dd}/${mm}</div>
    </div>`;
  });
  barHtml += '</div>';

  html += `<div class="dash-card" style="flex:1.6">
    <div class="dash-card-title">Ocupação por dia <span style="font-size:10px;color:var(--muted);font-weight:400;text-transform:none">· cinza=passado  azul=futuro</span></div>
    ${barHtml}
  </div>`;

  html += '</div>'; // dashboard-row

  // ── Tabela de pessoas ──
  html += '<div class="dash-card" style="margin-top:14px">';
  html += '<div class="dash-card-title">Resumo por pessoa</div>';
  html += '<table class="an-table"><thead><tr><th>Pessoa</th><th>Atendimentos</th><th>% do total</th><th>Próximos agendados</th><th>Carga</th></tr></thead><tbody>';

  ANALISTAS.forEach(an => {

    filtDays.forEach(day => {

    });

  document.getElementById('view-painel').innerHTML = html;
}

// ── RENDER LIVRES ──────────────────────────────────────────────────────────
function parseDataBR(dataBR) {
  // Converte DD/MM/YYYY para Date (sem hora, só data)
  const [d, m, y] = dataBR.split('/');
  return new Date(parseInt(y), parseInt(m)-1, parseInt(d));
}
function isHoje(dataBR) {
  const hoje = new Date();
  const d = parseDataBR(dataBR);
  return d.getFullYear()===hoje.getFullYear() && d.getMonth()===hoje.getMonth() && d.getDate()===hoje.getDate();
}
function isFuturoOuHoje(dataBR) {
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const d = parseDataBR(dataBR); d.setHours(0,0,0,0);
  return d >= hoje;
}

function renderLivres() {
  // So horarios livres em datas de hoje em diante
  const grupos = [];
  DAYS.forEach(day => {
    if (!isFuturoOuHoje(day.data)) return;
    const horarios = horariosDoDia(day).filter(h => !day.slots[h] || !day.slots[h].nome);
    if (horarios.length) grupos.push({ day, horarios });
  });
  const totalLivres = grupos.reduce((total, grupo) => total + grupo.horarios.length, 0);

  let html = `<div class="livres-header">
    <div class="livres-title">Próximas vagas disponíveis</div>
    <div class="livres-count">${totalLivres} vaga${totalLivres!==1?'s':''} livre${totalLivres!==1?'s':''}</div>
  </div>`;

  if (!grupos.length) {
    html += `<div class="empty"><div class="empty-icon">✅</div><div class="empty-text">Todos os horários estão preenchidos.</div></div>`;
  } else {
    html += '<div class="livres-grid">';
    grupos.forEach(({ day, horarios }, index) => {
      const avisoHtml = day.avisos && day.avisos.length
        ? `<div class="livre-avisos">${day.avisos.map(av => `<span class="aviso-tag" style="font-size:11px">⚠ ${av}</span>`).join('')}</div>`
        : '';
      html += `<section class="livre-day-card" style="animation-delay:${Math.min(index * 22, 180)}ms">
        <div class="livre-day-head">
          <div>
            <div class="livre-day-kicker">${day.weekday}${isHoje(day.data) ? ' · hoje' : ''}</div>
            <div class="livre-day-date">${day.data}</div>
          </div>
          <div class="livre-day-total">${horarios.length} vaga${horarios.length!==1?'s':''}</div>
        </div>
        ${avisoHtml}
        <div class="livre-times">
          ${horarios.map(h => `<button class="livre-time-chip" type="button" onclick="openSlot('${day.id}','${h}');setView('agenda')" title="Agendar ${h}"><span>${h}</span><small>+</small></button>`).join('')}
        </div>
      </section>`;
    });
    html += '</div>';
  }
  document.getElementById('view-livres').innerHTML = html;
}

// ── TEMA ───────────────────────────────────────────────────────────────────
const THEME_KEY = 'seplan_theme';

function applyTheme(theme) {
  const root = document.documentElement;
  const icon = document.getElementById('theme-icon');
  if (theme === 'light') {
    root.setAttribute('data-theme', 'light');
    if (icon) icon.textContent = '🌙';
  } else {
    root.setAttribute('data-theme', 'dark');
    if (icon) icon.textContent = '☀️';
  }
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  // detect effective current theme (might be from media query)
  const isDark = current === 'dark' ||
    (!current && window.matchMedia('(prefers-color-scheme: dark)').matches);
  const next = isDark ? 'light' : 'dark';
  localStorage.setItem(THEME_KEY, next);
  applyTheme(next);
}

function initTheme() {
  const saved = localStorage.getItem(THEME_KEY);
  if (saved) {
    applyTheme(saved);
  } else {
    // follow system — just set the icon correctly
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const icon = document.getElementById('theme-icon');
    if (icon) icon.textContent = prefersDark ? '☀️' : '🌙';
  }
  // listen for system changes (only if no manual override saved)
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
    if (!localStorage.getItem(THEME_KEY)) {
      const icon = document.getElementById('theme-icon');
      if (icon) icon.textContent = e.matches ? '☀️' : '🌙';
    }
  });
}



// ── BLOQUEIO DE ANALISTAS ──────────────────────────────────────────────────
let BLOQUEIOS = {}; // { "NomeAnalista": [ "DD/MM/YYYY", "DD/MM/YYYY>DD/MM/YYYY", ... ] }

function getBlockedAnalistas(dayId) {
  const day = DAYS.find(d => d.id === dayId);
  if (!day) return [];
  const blocked = [];
  Object.entries(BLOQUEIOS).forEach(([an, regras]) => {
    if (!regras) return;
    const lista = Array.isArray(regras) ? regras : Object.values(regras);
    for (const regra of lista) {
      if (regra.includes('>')) {
        // Período: "DD/MM/YYYY>DD/MM/YYYY"
        const [ini, fim] = regra.split('>');
        const d = parseDataBR(day.data);
        const dIni = parseDataBR(ini); dIni.setHours(0,0,0,0);
        const dFim = parseDataBR(fim); dFim.setHours(23,59,59,999);
        if (d >= dIni && d <= dFim) { blocked.push(an); break; }
      } else {
        // Dia específico
        if (regra === day.data) { blocked.push(an); break; }
      }
    }
  });
  return blocked;
}

function saveBloqueios() {
  window._fb.saveBloqueios(BLOQUEIOS);
}

function adicionarBloqueio(analista, tipo, dataIni, dataFim) {
  if (!BLOQUEIOS[analista]) BLOQUEIOS[analista] = [];
  const lista = Array.isArray(BLOQUEIOS[analista]) ? BLOQUEIOS[analista] : Object.values(BLOQUEIOS[analista]);
  const regra = tipo === 'periodo' ? `${dataIni}>${dataFim}` : dataIni;
  if (!lista.includes(regra)) lista.push(regra);
  BLOQUEIOS[analista] = lista;
  saveBloqueios();
  toast(`${analista} bloqueado ✓`);
  renderConfig();
}

function removerBloqueio(analista, idx) {
  const lista = Array.isArray(BLOQUEIOS[analista]) ? BLOQUEIOS[analista] : Object.values(BLOQUEIOS[analista]);
  lista.splice(idx, 1);
  BLOQUEIOS[analista] = lista;
  saveBloqueios();
  toast('Bloqueio removido');
  renderConfig();
}

const AGENDADORES_KEY = 'seplan_agendadores';

function loadAgendadores() {
  try { return JSON.parse(localStorage.getItem(AGENDADORES_KEY)) || []; }
  catch { return []; }
}
function saveAgendadores(list) { localStorage.setItem(AGENDADORES_KEY, JSON.stringify(list)); }
function salvarPessoas() {
  syncPessoas(PESSOAS);
  lastPessoasSaveJson = JSON.stringify(PESSOAS);
  skipConfigEchoUntil = Date.now() + 1200;
  ensureSelectedPessoa();
  window._fb.saveAnalistas(PESSOAS);
  rebuildFilters();

}

function editarPessoa(idx, campo, valor) {
  const atual = PESSOAS[idx];
  if (!atual) return;
  const antigoNome = atual.nome;
  if (campo === 'nome') {
    const novoNome = valor.trim();
    if (!novoNome) { toast('Informe o nome', true); renderConfig(); return; }
    const existe = PESSOAS.some((p, i) => i !== idx && p.nome.toLowerCase() === novoNome.toLowerCase());
    if (existe) { toast('Nome já existe', true); renderConfig(); return; }
    atual.nome = novoNome;
    if (novoNome !== antigoNome) {
      DAYS.forEach(day => {
        Object.values(day.slots || {}).forEach(slot => {
          if (slot.analista === antigoNome) slot.analista = novoNome;
        });
      });
      if (BLOQUEIOS[antigoNome]) {
        BLOQUEIOS[novoNome] = BLOQUEIOS[antigoNome];
        delete BLOQUEIOS[antigoNome];
        saveBloqueios();
      }
      saveDays();
    }
  } else if (campo === 'tipo') {
    atual.tipo = valor === 'fiscal' ? 'fiscal' : 'analista';
    const roleToggle = document.querySelector('.role-toggle');
    if (roleToggle) roleToggle.classList.toggle('fiscal', atual.tipo === 'fiscal');
  } else if (campo === 'cor') {
    atual.cor = /^#[0-9a-fA-F]{6}$/.test(valor) ? valor : atual.cor;
  }
  salvarPessoas();
  if (currentView === 'config') refreshSelectedPessoaDom();
  else render();
}

function addAnalista() {
  const input = document.getElementById('novo-analista');
  const tipo = document.getElementById('novo-tipo')?.value === 'fiscal' ? 'fiscal' : 'analista';
  const cor = document.getElementById('novo-cor')?.value || PALETA_PESSOAS[PESSOAS.length % PALETA_PESSOAS.length];
  const nome = input.value.trim();
  if (!nome) { toast('Informe o nome', true); return; }
  if (PESSOAS.some(p => p.nome.toLowerCase() === nome.toLowerCase())) { toast('Pessoa já existe', true); return; }
  PESSOAS.push({ nome, tipo, cor });
  selectedPessoaIdx = PESSOAS.length - 1;
  salvarPessoas();
  input.value = '';
  toast(`${nome} adicionado ✓`);
  renderConfig();
}

function removerAnalista(idx) {
  const nome = PESSOAS[idx]?.nome;
  if (!nome) return;
  if (!confirm(`Remover ${nome} da lista?`)) return;
  PESSOAS.splice(idx, 1);
  salvarPessoas();
  toast(`${nome} removido`);

}

function addAgendador() {

  if (selectedPessoaIdx < 0) return;

window._fb.listenDays(function(data) {
  if (data) {
    DAYS = Object.values(data)
      .map(day => {
        // Firebase pode converter arrays em objetos — normaliza
        const avisos = day.avisos
          ? (Array.isArray(day.avisos) ? day.avisos : Object.values(day.avisos))
          : [];
        // Garante que todos os horários existem
        const slots = {};
        const baseHorarios = horariosDoDia(day);
        Object.keys(day.slots || {}).forEach(h => {
          const s = day.slots[h];
          if (s && s.nome && !baseHorarios.includes(h)) baseHorarios.push(h);
        });
        baseHorarios.sort((a, b) => a.localeCompare(b)).forEach(h => {
          const s = day.slots && day.slots[h];
          slots[h] = s ? { nome: s.nome||'', assunto: s.assunto||'', analista: s.analista||'', agendadopor: s.agendadopor||'' }
                      : { nome:'', assunto:'', analista:'', agendadopor:'' };
        });
        return { ...day, avisos, slots };
      })
      .sort((a, b) => {
        const toIso = d => d.split('/').reverse().join('-');
        return toIso(a.data).localeCompare(toIso(b.data));
      });
  } else {
    // Banco vazio — popula com dados base
    DAYS = JSON.parse(JSON.stringify(BASE_DAYS));
    window._fb.saveDays(DAYS);
  }
  window._appReady = true;
  document.body.classList.remove('app-booting');
  document.body.classList.add('app-loaded');
  if (currentView === 'agenda') renderAgenda();
  else if (currentView === 'painel') renderPainel();
  else if (currentView === 'livres') renderLivres();
});
</script>
</body>
</html>
